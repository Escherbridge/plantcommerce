services:
  db:
    image: postgres:16
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: plantcommerce
      POSTGRES_PASSWORD: plantcommerce_dev_password
      POSTGRES_DB: plantcommerce
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantcommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
